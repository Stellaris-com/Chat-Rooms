spring.application.name=Chat-Rooms
server.port=8080

# DATABASE
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/chat_database}
spring.datasource.username=${DATASOURCE_USERNAME:user}
spring.datasource.password=${DATASOURCE_PASSWORD:admin}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SECURITY
security.private.key=${PRIVATE_KEY:}
security.public.key=${PUBLIC_KEY:}

# RABBITMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:rota-facil}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

# CHAT Exchage
rabbitmq.chat.exchange=${RABBITMQ_CHAT_EXCHANGE:chat.events}
# CHAT Routing keys
rabbitmq.message.send.routing.key=${RABBITMQ_MESSAGE_SEND_ROUTING_KEY:message.send}
# CHAT Queues
rabbitmq.web-socket.messages.queue=${RABBITMQ_WEB_SOCKET_MESSAGES_QUEUE:web.socket.messages.queue}
rabbitmq.notification.first.message.queue=${RABBITMQ_NOTIFICATION_FIRST_MESSAGE_QUEUE:notification.first.message.queue}

# ROOM Exchage
rabbitmq.room.exchange=${RABBITMQ_ROOM_EXCHANGE:room.events}
# ROOM Routing keys
rabbitmq.user.enter.room.routing.key=${RABBITMQ_USER_ENTER_ROOM_ROUTING_KEY:user.enter.room}
rabbitmq.user.exit.room.routing.key=${RABBITMQ_USER_EXIT_ROOM_ROUTING_KEY:user.exit.room}
# ROOM Queues
rabbitmq.notification.user.enter.room.queue=${RABBITMQ_NOTIFICATION_USER_ENTER_ROOM_QUEUE:notification.user.enter.room.queue}
rabbitmq.notification.user.exit.room.queue=${RABBITMQ_NOTIFICATION_USER_EXIT_ROOM_QUEUE:notification.user.exit.room.queue}
